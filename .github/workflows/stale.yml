name: Close stale PRs

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: read
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale PRs and post handoff
        uses: actions/github-script@v7
        env:
          POLYPROOF_API_URL: ${{ secrets.POLYPROOF_API_URL }}
          POLYPROOF_WEBHOOK_KEY: ${{ secrets.POLYPROOF_WEBHOOK_KEY }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const STALE_HOURS = 24;
            const staleThresholdMs = STALE_HOURS * 60 * 60 * 1000;
            const now = Date.now();

            // List all open PRs (paginated)
            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100
            });

            let closedCount = 0;
            for (const pr of openPRs) {
              // Get the latest commit on the PR's head branch
              const { data: commit } = await github.rest.repos.getCommit({
                owner, repo, ref: pr.head.sha
              });

              const lastCommitAt = new Date(commit.commit.committer.date).getTime();
              const ageMs = now - lastCommitAt;

              if (ageMs < staleThresholdMs) {
                core.info(`PR #${pr.number}: active (last commit ${Math.round(ageMs / 3600000)}h ago)`);
                continue;
              }

              // Don't close PRs that have already passed the approval gate —
              // they're just waiting for auto-merge (CI pass) and will merge
              // themselves. Closing them would discard work about to land.
              try {
                const statuses = await github.rest.repos.listCommitStatusesForRef({
                  owner, repo, ref: pr.head.sha, per_page: 100,
                });
                // Use the latest status for approval-gate (statuses are returned newest-first)
                const gateStatus = statuses.data.find(s => s.context === 'approval-gate');
                if (gateStatus && gateStatus.state === 'success') {
                  core.info(`PR #${pr.number}: STALE but approval-gate=success — skipping close (will auto-merge on CI)`);
                  continue;
                }
              } catch (e) {
                core.warning(`PR #${pr.number}: could not check approval-gate status: ${e.message}`);
                // Continue with close if we can't check — safer to close than to leak
              }

              core.info(`PR #${pr.number}: STALE (last commit ${Math.round(ageMs / 3600000)}h ago) — closing`);

              // Post GitHub comment
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr.number,
                body: `Closed due to inactivity (no new commits for ${STALE_HOURS}h). Branch \`${pr.head.ref}\` remains available — anyone can pick this up by opening a new PR from it or cherry-picking the commits.`
              });

              // Close the PR
              await github.rest.pulls.update({
                owner, repo, pull_number: pr.number, state: 'closed'
              });

              // Post to platform thread if PolyProof-Thread tag is present
              // Match strict slug chars to avoid picking up trailing \r, quotes, commas
              const body = pr.body || '';
              const threadMatch = body.match(/PolyProof-Thread:\s*([a-zA-Z0-9._-]+)/);
              if (threadMatch) {
                const topic = threadMatch[1];
                const apiUrl = process.env.POLYPROOF_API_URL;
                const webhookKey = process.env.POLYPROOF_WEBHOOK_KEY;
                if (apiUrl && webhookKey) {
                  const controller = new AbortController();
                  const timeoutId = setTimeout(() => controller.abort(), 15000);
                  try {
                    const response = await fetch(`${apiUrl}/api/v1/events/thread-post`, {
                      method: 'POST',
                      headers: {
                        'Authorization': `Bearer ${webhookKey}`,
                        'Content-Type': 'application/json',
                      },
                      body: JSON.stringify({
                        project_slug: 'flt',
                        topic: topic,
                        body: `PR #${pr.number} was closed due to inactivity — anyone can pick this up.`,
                      }),
                      signal: controller.signal,
                    });
                    clearTimeout(timeoutId);
                    const text = await response.text();
                    core.info(`Thread post for PR #${pr.number}: ${response.status} ${text}`);
                  } catch (e) {
                    clearTimeout(timeoutId);
                    core.warning(`Thread post failed for PR #${pr.number}: ${e.message}`);
                  }
                }
              } else {
                core.info(`PR #${pr.number}: no PolyProof-Thread tag, skipping thread notification`);
              }

              closedCount++;
            }

            core.info(`Stale sweep complete: closed ${closedCount} PRs`);
