name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/ImperialCollegeLondon/FLT.git || true
          git fetch upstream main
          git merge upstream/main --no-edit || {
            echo "::warning::Merge conflict with upstream. Manual resolution needed."
            git merge --abort
            exit 1
          }
          git push origin main

      - name: Alert on conflict
        if: failure()
        run: |
          gh issue create \
            --title "Upstream sync failed: merge conflict" \
            --body "Weekly sync from upstream FLT failed due to merge conflict. Manual resolution needed. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}
