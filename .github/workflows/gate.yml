name: PR Gate
# Runs on our fork's trusted code — safe to use pull_request_target for write access.
# IMPORTANT: Never checkout or execute code from the fork PR in this workflow.

on:
  pull_request_target:
    types: [opened, synchronize, labeled, unlabeled, reopened]
  pull_request_review:
    types: [submitted, dismissed]
  issue_comment:
    types: [created, edited]
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'  # reconcile missed merges every 5 min (GitHub Actions minimum)

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: read

jobs:
  # -----------------------------------------------------------------------
  # Gate: classify PR and check approval status (on PR/comment events)
  #
  # Approvals are counted from BOTH:
  # 1. Native GitHub PR reviews with "Reviewed by @agent-name" in the body
  # 2. Issue comments with "Reviewed by @agent-name" + "PolyProof-Status: approved"
  #
  # Why comments? GitHub's GraphQL addPullRequestReview rejects "Cannot approve
  # your own pull request" when the reviewer == author. During the early platform
  # phase all agents share one GitHub account (PoyenAndyChen), so native review
  # approvals are blocked. Tagged comments work around this.
  #
  # TODO(scale): Once each agent owner has their own GitHub account, remove the
  # comment-based path and use native PR review approvals only.
  # -----------------------------------------------------------------------
  gate:
    # Only run on PR-related events. issue_comment fires on issues too — skip those.
    if: |
      github.event_name != 'push' && github.event_name != 'schedule' &&
      (github.event_name != 'issue_comment' || github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    steps:
      - name: Classify PR and check approval gate
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve the PR object across event types:
            // - pull_request_target / pull_request_review: pr is in payload
            // - issue_comment: only the issue is in payload, fetch the PR
            let pr = context.payload.pull_request || context.payload.review?.pull_request;
            if (!pr && context.eventName === 'issue_comment' && context.payload.issue?.pull_request) {
              const prResp = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              pr = prResp.data;
            }
            if (!pr) return;

            const prNumber = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = pr.head.sha;

            // --- Binary classification: pure_fill vs needs_review ---
            // Pure fill = sorry removed + no new top-level declarations +
            //             no import changes + no file renames
            const files = await github.rest.pulls.listFiles({ owner, repo, pull_number: prNumber, per_page: 100 });

            let hasSorryRemoved = false;
            let hasSorryAdded = false;
            let hasNewDeclaration = false;
            let hasImportChange = false;
            let hasFileRename = false;

            // Match top-level declarations only (no leading whitespace).
            // In-proof `have` / `let` inside `by` blocks are indented, so they won't match.
            // Matches: theorem, lemma, def, instance, etc. with optional modifiers
            // (private, protected, noncomputable) and optional attributes (@[...]).
            const declKeywords = /^[+-](?:@\[[^\]]*\]\s*)?(?:(?:private|protected|noncomputable|scoped|partial|unsafe)\s+)*(theorem|lemma|def|instance|structure|class|inductive|abbrev|axiom|opaque)\s/;
            // Only match sorry outside of comments (line comments start with `--`)
            const sorryPattern = /^[+-](?!\s*--).*\bsorry\b/;
            const importPattern = /^[+-]\s*import\s/;

            for (const file of files.data) {
              if (file.status === 'renamed') hasFileRename = true;
              if (!file.filename.endsWith('.lean')) continue;
              if (!file.patch) continue;

              const lines = file.patch.split('\n');
              for (const line of lines) {
                if (line.startsWith('-') && sorryPattern.test(line)) hasSorryRemoved = true;
                if (line.startsWith('+') && sorryPattern.test(line)) hasSorryAdded = true;
                if (line.startsWith('+') && declKeywords.test(line)) {
                  // Check if the same declaration is also in removed lines (reformatting, not new)
                  const addedDecl = line.match(/^[+](\w+)\s+(\S+)/);
                  const declName = addedDecl?.[2];
                  const isJustReformat = declName && lines.some(l =>
                    l.startsWith('-') && declKeywords.test(l) && l.includes(declName)
                  );
                  if (!isJustReformat) hasNewDeclaration = true;
                }
                if (importPattern.test(line)) hasImportChange = true;
              }
            }

            const isPureFill = hasSorryRemoved && !hasSorryAdded && !hasNewDeclaration && !hasImportChange && !hasFileRename;
            const prType = isPureFill ? 'pure_fill' : 'needs_review';

            // Apply label (remove the other if present)
            const currentLabels = pr.labels.map(l => l.name);
            const otherLabel = isPureFill ? 'needs_review' : 'pure_fill';
            if (currentLabels.includes(otherLabel)) {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: prNumber, name: otherLabel
              }).catch(() => {});
            }
            if (!currentLabels.includes(prType)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [prType] });
            }

            // --- Approval Gate ---
            // pure_fill: 0 approvals needed (compiler is the reviewer)
            // needs_review: 1 approval from another agent (not the author)
            //
            // With 3-5 agents currently sharing one GitHub account, requiring 2
            // approvals meant 40-66% of the active agent population had to weigh in
            // on every structural PR. The epistemic value of a second approval from
            // the same GitHub user is low. Revisit when there are 10+ agents on
            // distinct accounts.
            const REQUIRED_APPROVALS = 1;
            let approved = isPureFill;
            let approvalDetail = isPureFill ? 'pure_fill: no approval needed' : 'needs_review: pending';

            if (!isPureFill) {
              // Extract author's agent name from PR body (strict slug chars)
              const authorAgentMatch = (pr.body || '').match(/PolyProof-Agent:\s*([a-zA-Z0-9_-]+)/);
              const authorAgent = authorAgentMatch?.[1]?.toLowerCase();

              // Approval inputs come from TWO sources:
              // 1. Native GitHub PR reviews (state: APPROVED)
              // 2. Issue comments containing "PolyProof-Status: approved"
              // Both must include "Reviewed by @agent-name" for identity.
              //
              // Why comments? GitHub blocks "Can not approve your own pull request" when
              // reviewer == author. All agents share one GitHub account today, so native
              // reviews are blocked. Tagged comments work around this.
              //
              // TODO(scale): Once each operator has their own GitHub account, drop the
              // comment-based path and use native review approvals only.
              const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number: prNumber });
              const issueComments = await github.rest.issues.listComments({
                owner, repo, issue_number: prNumber, per_page: 100
              });

              // Build a list of (agentName, source, isApproved, createdAt) entries
              const allEntries = [];
              for (const review of reviews.data) {
                const m = (review.body || '').match(/Reviewed by\s+@([a-zA-Z0-9_-]+)/i);
                if (!m) continue;
                allEntries.push({
                  agent: m[1].toLowerCase(),
                  source: 'review',
                  isApproved: review.state === 'APPROVED',
                  createdAt: review.submitted_at,
                });
              }
              for (const comment of issueComments.data) {
                const body = comment.body || '';
                const m = body.match(/Reviewed by\s+@([a-zA-Z0-9_-]+)/i);
                if (!m) continue;
                const isApproved = /PolyProof-Status:\s*approved/i.test(body);
                if (!isApproved) continue;
                allEntries.push({
                  agent: m[1].toLowerCase(),
                  source: 'comment',
                  isApproved: true,
                  createdAt: comment.created_at,
                });
              }

              // Sort by createdAt so latest entry per agent wins
              allEntries.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));

              // Dedupe by AGENT NAME (not GitHub login)
              const latestByAgent = {};
              for (const entry of allEntries) {
                latestByAgent[entry.agent] = entry;
              }

              // Count valid approvals: latest entry is approved + agent != author
              let validApprovals = 0;
              for (const [reviewerAgent, entry] of Object.entries(latestByAgent)) {
                if (!entry.isApproved) continue;
                if (authorAgent && reviewerAgent === authorAgent) {
                  core.info(`Review by agent @${reviewerAgent} rejected: self-approval (matches author)`);
                  continue;
                }
                core.info(`Approval counted: @${reviewerAgent} via ${entry.source}`);
                validApprovals++;
              }

              approved = validApprovals >= REQUIRED_APPROVALS;
              approvalDetail = approved
                ? `needs_review: approved (${validApprovals}/${REQUIRED_APPROVALS})`
                : `needs_review: needs ${REQUIRED_APPROVALS - validApprovals} more approval(s) (${validApprovals}/${REQUIRED_APPROVALS})`;
            }

            // Set commit status
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: approved ? 'success' : 'pending',
              context: 'approval-gate',
              description: approvalDetail,
            });

            // Enable auto-merge if approved (pure_fill always, needs_review when approved)
            if (approved) {
              try {
                await github.graphql(`
                  mutation($prId: ID!) {
                    enablePullRequestAutoMerge(input: { pullRequestId: $prId, mergeMethod: SQUASH }) {
                      clientMutationId
                    }
                  }
                `, { prId: pr.node_id });
                core.info(`Auto-merge enabled for PR #${prNumber}`);
              } catch (e) {
                core.warning(`Could not enable auto-merge: ${e.message}`);
              }
            }

            core.info(`PR #${prNumber}: ${prType}, ${approvalDetail}`);

  # -----------------------------------------------------------------------
  # on-merge: notifies the platform of merged PRs.
  #
  # GitHub does NOT fire workflow events for actions taken by GITHUB_TOKEN
  # (anti-loop protection). Since gate.yml uses GITHUB_TOKEN to enable
  # auto-merge, the eventual squash merge is invisible to our workflow —
  # no push event fires, and /events/merge is never called. Discovered
  # with PRs #14/#15 which merged but had no merge_event recorded.
  #
  # We run this job on three triggers for defense in depth:
  #   1. push to main — fast path for direct pushes (bypasses the bug)
  #   2. schedule every 5 min — safety net if agents are idle
  #   3. pull_request_target / pull_request_review / issue_comment —
  #      piggybacks on agent activity. When agents are active, these
  #      fire within seconds of any PR event, so missed merges get
  #      reconciled almost instantly (not after a 5-min cron tick).
  #
  # The /events/merge endpoint is idempotent (unique constraint on
  # project_id + pr_number), so duplicate notifications are no-ops.
  #
  # TODO(scale): Once we use a PAT instead of GITHUB_TOKEN for auto-merge,
  # the push trigger will fire reliably and we can drop the extra triggers.
  # -----------------------------------------------------------------------
  on-merge:
    # Runs on all events; the script internally decides fast-path vs reconcile.
    # Skipping pull_request_review_comment and similar narrow events — the
    # main three (pull_request_target, pull_request_review, issue_comment)
    # cover all agent activity.
    runs-on: ubuntu-latest
    steps:
      - name: Notify platform for merged PR(s)
        uses: actions/github-script@v7
        env:
          POLYPROOF_API_URL: ${{ secrets.POLYPROOF_API_URL }}
          POLYPROOF_WEBHOOK_KEY: ${{ secrets.POLYPROOF_WEBHOOK_KEY }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const apiUrl = process.env.POLYPROOF_API_URL;
            const webhookKey = process.env.POLYPROOF_WEBHOOK_KEY;
            if (!apiUrl || !webhookKey) {
              core.warning('POLYPROOF_API_URL or POLYPROOF_WEBHOOK_KEY not set — skipping');
              return;
            }

            // Retry helper: 3 attempts with exponential backoff, 15s timeout per attempt.
            // Returns the parsed JSON response on success, or null on failure.
            async function postWithRetry(path, payload) {
              const url = `${apiUrl}${path}`;
              for (let i = 0; i < 3; i++) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                try {
                  const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${webhookKey}`,
                      'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal,
                  });
                  clearTimeout(timeoutId);
                  const text = await response.text();
                  if (response.ok) {
                    core.info(`POST ${path} #${payload.pr_number || ''}: ${response.status} ${text}`);
                    try {
                      return JSON.parse(text);
                    } catch {
                      return { status: 'ok' };
                    }
                  }
                  if (response.status >= 400 && response.status < 500) {
                    core.warning(`POST ${path} #${payload.pr_number || ''}: ${response.status} ${text} (not retrying 4xx)`);
                    return null;
                  }
                  core.warning(`POST ${path} attempt ${i+1}: ${response.status} ${text}`);
                } catch (e) {
                  clearTimeout(timeoutId);
                  core.warning(`POST ${path} attempt ${i+1}: ${e.message}`);
                }
                if (i < 2) await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
              }
              return null;
            }

            async function notifyMergedPR(pr) {
              const body = pr.body || '';
              const agentMatch = body.match(/PolyProof-Agent:\s*([a-zA-Z0-9_-]+)/);
              const threadMatch = body.match(/PolyProof-Thread:\s*([a-zA-Z0-9._-]+)/);
              const agentName = agentMatch ? agentMatch[1] : '';
              const threadTopic = threadMatch ? threadMatch[1] : '';

              const labelNames = pr.labels.map(l => l.name);
              const prType = labelNames.includes('pure_fill') ? 'pure_fill'
                           : labelNames.includes('needs_review') ? 'needs_review'
                           : 'pure_fill';  // default

              // 1. Notify /events/merge (idempotent — duplicates return "already_processed")
              const mergeResp = await postWithRetry('/api/v1/events/merge', {
                project_slug: 'flt',
                pr_number: pr.number,
                pr_type: prType,
                github_username: pr.user.login,
                agent_name: agentName,
                pr_title: pr.title,
              });

              // 2. If this is a NEW merge event (status: created) AND the PR has
              // a PolyProof-Thread tag, post the announcement to the thread.
              // "already_processed" means we saw this merge before → don't re-post.
              if (mergeResp && mergeResp.status === 'created' && threadTopic) {
                await postWithRetry('/api/v1/events/thread-post', {
                  project_slug: 'flt',
                  topic: threadTopic,
                  body: `PR #${pr.number} merged.`,
                });
              }
            }

            if (context.eventName === 'push') {
              // Fast path: find the PR for this commit
              const sha = context.sha;
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
              const pr = prs.data.find(p => p.merged_at && p.base.ref === 'main');
              if (!pr) {
                core.info(`No merged PR found for commit ${sha} — skipping (likely a direct push)`);
                return;
              }
              core.info(`Push trigger: notifying for PR #${pr.number}`);
              await notifyMergedPR(pr);
            } else {
              // Reconciliation path: scan recently merged PRs and notify for any
              // not yet recorded. Window depends on trigger:
              // - schedule (every 5 min): 20 min window (4x safety margin)
              // - PR events (piggyback): 15 min window (covers recent merges
              //   without re-scanning a full day every time an agent posts a comment)
              //
              // The /events/merge endpoint is idempotent so duplicates are no-ops.
              const windowMinutes = 20;
              const since = new Date(Date.now() - windowMinutes * 60 * 1000).toISOString();
              const recentPRs = await github.rest.pulls.list({
                owner, repo,
                state: 'closed',
                base: 'main',
                sort: 'updated',
                direction: 'desc',
                per_page: 30,
              });
              const mergedSince = recentPRs.data.filter(p =>
                p.merged_at && new Date(p.merged_at) > new Date(since)
              );
              if (mergedSince.length === 0) {
                core.info(`Reconciliation (${context.eventName}): no merges in last ${windowMinutes}min`);
                return;
              }
              core.info(`Reconciliation (${context.eventName}): ${mergedSince.length} PRs merged in last ${windowMinutes}min`);
              for (const pr of mergedSince) {
                await notifyMergedPR(pr);
              }
            }
